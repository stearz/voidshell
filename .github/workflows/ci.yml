name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions: read code, write packages (for GHCR push on main).
# packages: write is only exercised in the build job on non-PR runs.
permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "The following files need gofmt:"
            echo "$out"
            exit 1
          fi

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: "3.17.0"

      - name: Lint chart
        run: helm lint charts/voidshell

  scan:
    name: Scan container images
    runs-on: ubuntu-latest
    needs: [test, helm-lint]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build voidshell image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: voidshell:scan
          cache-from: type=gha

      - name: Scan voidshell image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: voidshell:scan
          format: sarif
          output: trivy-voidshell.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload voidshell scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-voidshell.sarif
          category: voidshell

      - name: Build workspace image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.workspace
          platforms: linux/amd64
          load: true
          tags: voidshell-workspace:scan
          cache-from: type=gha

      - name: Scan workspace image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: voidshell-workspace:scan
          format: sarif
          output: trivy-workspace.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload workspace scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-workspace.sarif
          category: workspace

  build:
    name: Build container image
    runs-on: ubuntu-latest
    needs: [test, helm-lint, scan]
    steps:
      - uses: actions/checkout@v6

      # Required for linux/arm64 cross-compilation in the Dockerfile build stage.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      # Log in to GHCR only on non-PR runs (PRs from forks don't have write access).
      # Requires packages: write permission declared above.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Push only on main-branch commits, not on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main
          # Layer cache stored in GitHub Actions cache — correctness does not
          # depend on the cache being present.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build workspace image (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.workspace
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}-workspace:${{ github.sha }}
            ghcr.io/${{ github.repository }}-workspace:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
