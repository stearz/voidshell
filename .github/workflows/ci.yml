name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions: read code, write packages (for GHCR push on main).
# packages: write is only exercised in the build job on non-PR runs.
permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "The following files need gofmt:"
            echo "$out"
            exit 1
          fi

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.17.0"

      - name: Lint chart
        run: helm lint charts/voidshell

  build:
    name: Build container image
    runs-on: ubuntu-latest
    needs: [test, helm-lint]
    steps:
      - uses: actions/checkout@v4

      # Required for linux/arm64 cross-compilation in the Dockerfile build stage.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Log in to GHCR only on non-PR runs (PRs from forks don't have write access).
      # Requires packages: write permission declared above.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Push only on main-branch commits, not on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main
          # Layer cache stored in GitHub Actions cache — correctness does not
          # depend on the cache being present.
          cache-from: type=gha
          cache-to: type=gha,mode=max
