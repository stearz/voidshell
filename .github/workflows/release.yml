name: Release

# Triggered when release-please publishes a GitHub Release (i.e. merging the
# release PR creates a tag and this workflow runs automatically).
on:
  release:
    types: [published]

# Minimal permissions: read code, write GHCR packages (container + Helm chart).
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  CHART_REPO: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  container:
    name: Publish container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # QEMU required for linux/arm64 cross-build on the amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract semver from tag
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "semver=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.tag }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.semver }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-chart:
    name: Publish Helm chart to GHCR OCI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: "3.17.0"

      - uses: mikefarah/yq@v4

      - name: Extract semver from tag
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "semver=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Stamp chart version and appVersion
        run: |
          VERSION=${{ steps.ver.outputs.semver }}
          yq -i ".version = \"${VERSION}\"" charts/voidshell/Chart.yaml
          yq -i ".appVersion = \"${VERSION}\"" charts/voidshell/Chart.yaml

      - name: Package chart
        run: helm package charts/voidshell

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ${{ env.REGISTRY }} \
                -u ${{ github.actor }} --password-stdin

      # Pushes to: oci://ghcr.io/<owner>/charts/voidshell:<semver>
      # Install with: helm install voidshell oci://ghcr.io/stearz/charts/voidshell --version <semver>
      - name: Push chart to GHCR
        run: |
          helm push voidshell-${{ steps.ver.outputs.semver }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
