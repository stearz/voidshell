{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "voidshell.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "voidshell.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "voidshell.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.ssh.port }}
      {{- if .Values.networkPolicy.ingressCIDRs }}
      from:
        {{- range .Values.networkPolicy.ingressCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
{{- end }}
