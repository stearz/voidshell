apiVersion: v1
kind: Service
metadata:
  name: {{ include "voidshell.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "voidshell.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: ssh
      protocol: TCP
      name: ssh
  selector:
    {{- include "voidshell.selectorLabels" . | nindent 4 }}
